name: release

on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
      - run: uv pip install --system -e ".[dev]"
      - run: pytest

  build-and-publish:
    needs: test
    runs-on: ubuntu-latest
    # Trusted publishing (OIDC) — no PyPI token needed. Configure the project
    # on PyPI under "Publishing" -> add this repo + workflow as a trusted
    # publisher. See https://docs.pypi.org/trusted-publishers/.
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
      - name: Build
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
